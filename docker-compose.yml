services:
  # Service PHP
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_php
    volumes:
      - .:/srv/app:cached
      - app_cache:/srv/app/var/cache
      - app_logs:/srv/app/var/log
    networks:
      - oumi_blog_net

  # Service Serveur Web Nginx
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - .:/srv/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - oumi_blog_net

  # Service Base de Données MySQL
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oumi_blog_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "33066:3306"
    networks:
      - oumi_blog_net

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - oumi_blog_net

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    networks:
      - oumi_blog_net

volumes:
  db_data:
  app_cache:
  app_logs:

networks:
  oumi_blog_net:
    driver: bridge
